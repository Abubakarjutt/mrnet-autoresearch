name: MRNet Autoresearch

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: "Number of autoresearch iterations to run"
        required: true
        default: "24"
        type: string
      run_tag:
        description: "Optional run tag prefix"
        required: false
        default: ""
        type: string
      data_root:
        description: "Optional MRNet dataset path on the self-hosted runner"
        required: false
        default: ""
        type: string
      state_dir:
        description: "Optional persistent autoresearch state directory on the runner"
        required: false
        default: ""
        type: string
      time_budget_minutes:
        description: "Per-candidate wall clock budget in minutes"
        required: true
        default: "60"
        type: string
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: mrnet-autoresearch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-experiments:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 2160
    defaults:
      run:
        shell: bash
        working-directory: MRNet-AI-assited-diagnosis-of-knee-injuries
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cleanup runner diagnostics
        run: |
          RUNNER_ROOT="$(cd "${RUNNER_TEMP}/../.." && pwd)"
          WORKSPACE_ROOT="$(basename "$(dirname "$GITHUB_WORKSPACE")")"
          echo "runner_root=$RUNNER_ROOT"
          python3 cleanup_runner_diag.py \
            --runner-root "$RUNNER_ROOT" \
            --keep-runner-logs 3 \
            --keep-worker-logs 6 \
            --keep-pages 64 \
            --keep-blocks 64 \
            --keep-temp-files 32 \
            --keep-runner-command-files 64 \
            --keep-workflow-files 8 \
            --temp-max-age-hours 6 \
            --workspace-max-age-hours 168 \
            --keep-workspace-root "$WORKSPACE_ROOT" \
            --min-free-gb 40

      - name: Verify Python
        run: |
          python3 --version
          python3 -m pip --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install \
            geomloss \
            pandas \
            scikit-learn \
            tensorboardx \
            torch \
            torchaudio \
            torchvision

      - name: Resolve dataset path
        id: dataset
        run: |
          DATA_ROOT="${{ vars.MRNET_DATA_ROOT }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.data_root }}" ]; then
            DATA_ROOT="${{ inputs.data_root }}"
          fi
          if [ -z "$DATA_ROOT" ]; then
            DATA_ROOT="$PWD/MRNet-v1.0"
          fi

          CANDIDATES=("$DATA_ROOT" "$DATA_ROOT/MRNet-v1.0")
          RESOLVED_ROOT=""
          for candidate in "${CANDIDATES[@]}"; do
            if [ -f "$candidate/train-abnormal.csv" ] && [ -f "$candidate/valid-abnormal.csv" ] && [ -d "$candidate/train/axial" ] && [ -d "$candidate/valid/axial" ]; then
              RESOLVED_ROOT="$candidate"
              break
            fi
          done

          if [ -z "$RESOLVED_ROOT" ]; then
            echo "MRNet dataset root is invalid. Checked: ${CANDIDATES[*]}" >&2
            for candidate in "${CANDIDATES[@]}"; do
              echo "--- $candidate ---" >&2
              ls -la "$candidate" >&2 || true
            done
            exit 1
          fi

          echo "data_root=$RESOLVED_ROOT" >> "$GITHUB_OUTPUT"

      - name: Run autoresearch batch
        run: |
          rm -rf ci_results
          mkdir -p ci_results
          RUN_TAG="${{ github.event.inputs.run_tag }}"
          if [ -z "$RUN_TAG" ]; then
            RUN_TAG="gha-${GITHUB_RUN_ID}"
          fi

          ITERATIONS="${{ github.event.inputs.iterations }}"
          if [ -z "$ITERATIONS" ]; then
            ITERATIONS="24"
          fi

          STATE_DIR="${{ github.event.inputs.state_dir }}"
          if [ -z "$STATE_DIR" ]; then
            STATE_DIR="$HOME/.mrnet_autoresearch"
          fi
          mkdir -p "$STATE_DIR/tmp"
          export TMPDIR="$STATE_DIR/tmp"
          export TMP="$STATE_DIR/tmp"
          export TEMP="$STATE_DIR/tmp"

          TIME_BUDGET_MINUTES="${{ github.event.inputs.time_budget_minutes }}"
          if [ -z "$TIME_BUDGET_MINUTES" ]; then
            TIME_BUDGET_MINUTES="60"
          fi

          cmd=(
            python3 -u autoresearch_loop.py
            --iterations "$ITERATIONS"
            --state_dir "$STATE_DIR"
            --data_root "${{ steps.dataset.outputs.data_root }}"
            --time_budget_minutes "$TIME_BUDGET_MINUTES"
            --min_free_gb "40"
            --summary_file "ci_results/summary.md"
          )

          CONSOLE_LOG="ci_results/autoresearch_console.log"
          : > "$CONSOLE_LOG"
          set +e
          caffeinate -dimsu "${cmd[@]}" >"$CONSOLE_LOG" 2>&1 &
          cmd_pid=$!
          while kill -0 "$cmd_pid" 2>/dev/null; do
            echo "[$(date -u +%FT%TZ)] autoresearch batch still running"
            tail -n 5 "$CONSOLE_LOG" || true
            sleep 60
          done
          wait "$cmd_pid"
          loop_status=$?
          set -e
          if [ "$loop_status" -ne 0 ]; then
            echo "autoresearch loop failed; last 120 console lines:" >&2
            tail -n 120 "$CONSOLE_LOG" >&2 || true
            exit "$loop_status"
          fi
          echo "autoresearch loop completed; last 20 console lines:"
          tail -n 20 "$CONSOLE_LOG" || true

          if ! python3 export_ci_artifacts.py --state-dir "$STATE_DIR" --output-dir "ci_results"; then
            echo "warning: failed to export latest autoresearch artifacts" >&2
          fi

      - name: Publish summary
        if: ${{ always() && !cancelled() }}
        run: |
          if [ -f "ci_results/summary.md" ]; then
            cat "ci_results/summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f "ci_results/results.tsv" ]; then
            {
              echo
              echo '```tsv'
              cat "ci_results/results.tsv"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload experiment artifacts
        if: ${{ always() && !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: mrnet-autoresearch-${{ github.run_id }}
          path: |
            MRNet-AI-assited-diagnosis-of-knee-injuries/ci_results
          if-no-files-found: warn
