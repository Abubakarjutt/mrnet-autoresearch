name: MRNet Autoresearch

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: "Number of autoresearch iterations to run"
        required: true
        default: "24"
        type: string
      run_tag:
        description: "Optional run tag prefix"
        required: false
        default: ""
        type: string
      data_root:
        description: "Optional MRNet dataset path on the self-hosted runner"
        required: false
        default: ""
        type: string
      state_dir:
        description: "Optional persistent autoresearch state directory on the runner"
        required: false
        default: ""
        type: string
      time_budget_minutes:
        description: "Per-candidate wall clock budget in minutes"
        required: true
        default: "60"
        type: string
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: mrnet-autoresearch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-experiments:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 2160
    defaults:
      run:
        shell: bash
        working-directory: MRNet-AI-assited-diagnosis-of-knee-injuries
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cleanup runner diagnostics
        run: |
          RUNNER_ROOT="$(cd "${RUNNER_TEMP}/../.." && pwd)"
          echo "runner_root=$RUNNER_ROOT"
          python3 cleanup_runner_diag.py \
            --runner-root "$RUNNER_ROOT" \
            --keep-runner-logs 3 \
            --keep-worker-logs 6 \
            --keep-pages 64 \
            --keep-blocks 64 \
            --min-free-gb 20

      - name: Verify Python
        run: |
          python3 --version
          python3 -m pip --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install \
            geomloss \
            pandas \
            scikit-learn \
            tensorboardx \
            torch \
            torchaudio \
            torchvision

      - name: Resolve dataset path
        id: dataset
        run: |
          DATA_ROOT="${{ vars.MRNET_DATA_ROOT }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.data_root }}" ]; then
            DATA_ROOT="${{ inputs.data_root }}"
          fi
          if [ -z "$DATA_ROOT" ]; then
            DATA_ROOT="$PWD/MRNet-v1.0"
          fi
          if [ ! -d "$DATA_ROOT" ]; then
            echo "MRNet dataset path not found: $DATA_ROOT" >&2
            exit 1
          fi
          echo "data_root=$DATA_ROOT" >> "$GITHUB_OUTPUT"

      - name: Run autoresearch batch
        run: |
          mkdir -p ci_results
          RUN_TAG="${{ github.event.inputs.run_tag }}"
          if [ -z "$RUN_TAG" ]; then
            RUN_TAG="gha-${GITHUB_RUN_ID}"
          fi

          ITERATIONS="${{ github.event.inputs.iterations }}"
          if [ -z "$ITERATIONS" ]; then
            ITERATIONS="24"
          fi

          STATE_DIR="${{ github.event.inputs.state_dir }}"
          if [ -z "$STATE_DIR" ]; then
            STATE_DIR="$HOME/.mrnet_autoresearch"
          fi

          TIME_BUDGET_MINUTES="${{ github.event.inputs.time_budget_minutes }}"
          if [ -z "$TIME_BUDGET_MINUTES" ]; then
            TIME_BUDGET_MINUTES="60"
          fi

          cmd=(
            python3 autoresearch_loop.py
            --iterations "$ITERATIONS"
            --state_dir "$STATE_DIR"
            --data_root "${{ steps.dataset.outputs.data_root }}"
            --time_budget_minutes "$TIME_BUDGET_MINUTES"
            --summary_file "ci_results/summary.md"
          )

          "${cmd[@]}"

          if ! python3 export_ci_artifacts.py --state-dir "$STATE_DIR" --output-dir "ci_results"; then
            echo "warning: failed to export latest autoresearch artifacts" >&2
          fi

      - name: Publish summary
        if: always()
        run: |
          if [ -f "ci_results/summary.md" ]; then
            cat "ci_results/summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f "ci_results/results.tsv" ]; then
            {
              echo
              echo '```tsv'
              cat "ci_results/results.tsv"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload experiment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mrnet-autoresearch-${{ github.run_id }}
          path: |
            MRNet-AI-assited-diagnosis-of-knee-injuries/ci_results
          if-no-files-found: warn
